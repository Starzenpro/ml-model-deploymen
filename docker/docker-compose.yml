version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ml-api:latest
    container_name: ml-api
    ports:
      - "8000:8000"
    volumes:
      - ../app/models:/app/app/models
      - ../logs:/app/logs
    environment:
      - MODEL_PATH=/app/app/models/model.pkl
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ml-network

  # Uncomment for monitoring
  # prometheus:
  #   image: prom/prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - ml-network

networks:
  ml-network:
    driver: bridge
